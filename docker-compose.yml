version: "3.9"

services:
  db:
    image: postgres:16-alpine
    hostname: sepa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sepa
      POSTGRES_USER: sepa
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepa"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    image: njohbillie/sepa-trader-backend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://sepa:${DB_PASSWORD}@sepa-postgres:5432/sepa
      REDIS_URL: redis://redis:6379
      ALPACA_PAPER_KEY: ${ALPACA_PAPER_KEY}
      ALPACA_PAPER_SECRET: ${ALPACA_PAPER_SECRET}
      ALPACA_LIVE_KEY: ${ALPACA_LIVE_KEY}
      ALPACA_LIVE_SECRET: ${ALPACA_LIVE_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SECRET_KEY: ${SECRET_KEY}
    networks:
      - internal
      - npm_network

  frontend:
    image: njohbillie/sepa-trader-frontend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - npm_network

networks:
  internal:
    driver: bridge
  npm_network:
    external: true
    name: nginx-proxy-manager_nginx_proxy

volumes:
  pg_data:
  redis_data:
