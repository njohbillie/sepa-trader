version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sepa
      POSTGRES_USER: sepa
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sepa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    image: njohbillie/sepa-trader-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://sepa:${DB_PASSWORD}@db:5432/sepa
      REDIS_URL: redis://redis:6379
      ALPACA_PAPER_KEY: ${ALPACA_PAPER_KEY}
      ALPACA_PAPER_SECRET: ${ALPACA_PAPER_SECRET}
      ALPACA_LIVE_KEY: ${ALPACA_LIVE_KEY}
      ALPACA_LIVE_SECRET: ${ALPACA_LIVE_SECRET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    image: njohbillie/sepa-trader-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pg_data:
  redis_data:
