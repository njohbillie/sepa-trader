name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    name: Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            njohbillie/sepa-trader-backend:latest
            njohbillie/sepa-trader-backend:${{ github.sha }}

  build-frontend:
    name: Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            njohbillie/sepa-trader-frontend:latest
            njohbillie/sepa-trader-frontend:${{ github.sha }}
