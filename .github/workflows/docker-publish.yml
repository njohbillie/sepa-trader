name: Build & Push to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    name: Backend — v${{ github.run_number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: njohbillie/sepa-trader-backend:v${{ github.run_number }}

  build-frontend:
    name: Frontend — v${{ github.run_number }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: njohbillie/sepa-trader-frontend:v${{ github.run_number }}

  deploy:
    name: Deploy to Synology — v${{ github.run_number }}
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SYNOLOGY_HOST }}
          username: ${{ secrets.SYNOLOGY_USER }}
          key:      ${{ secrets.SYNOLOGY_SSH_KEY }}
          port:     ${{ secrets.SYNOLOGY_PORT }}
          script: |
            set -e
            cd ${{ secrets.SYNOLOGY_PROJECT_PATH }}

            echo "==> Updating IMAGE_TAG to v${{ github.run_number }}"
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=v${{ github.run_number }}/" .env

            echo "==> Pulling new images"
            docker compose pull

            echo "==> Restarting containers"
            docker compose up -d --remove-orphans

            echo "==> Cleaning up old images"
            docker image prune -f

            echo "==> Done. Running containers:"
            docker compose ps
